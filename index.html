<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASMUVE - Asociación Musical de la Vieja Escuela</title>
    <!-- Enlace oficial y actualizado a los iconos de FontAwesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* Estilos Generales Corregidos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* Corregido aquí */
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Línea decorativa superior morada */
        .top-bar {
            height: 4px;
            background-color: #7b1fa2; 
            width: 100%;
        }

        /* Navegación Superior */
        header {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 2.5rem;
        }
        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        nav ul li a:hover {
            color: #b388ff;
        }

        /* Redes Sociales del Header */
        .social-header a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 1.2rem;
            font-size: 1rem;
            transition: color 0.3s ease;
        }
        .social-header a:hover {
            color: #b388ff;
        }

        /* Contenido Central */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }
        .main-title {
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin-bottom: 1.5rem;
            font-weight: bold;
        }
        .logo-container {
            max-width: 320px;
            width: 100%;
            margin-bottom: 2rem;
        }
        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Línea separadora antes del footer */
        .divider {
            width: 60px;
            height: 1px;
            background-color: #333333;
            margin-bottom: 1.5rem;
        }

        /* Pie de Página */
        footer {
            padding: 2rem 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: #888888;
        }
        .social-footer {
            margin-bottom: 1rem;
        }
        .social-footer p {
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
            color: #aaaaaa;
        }
        .social-footer-icons a {
            color: #ffffff;
            font-size: 1.2rem;
            margin: 0 0.8rem;
            transition: color 0.3s ease;
        }
        .social-footer-icons a:hover {
            color: #b388ff;
        }
        .copyright {
            font-size: 0.7rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <!-- Línea morada superior -->
    <div class="top-bar"></div>

    <!-- Menú de Navegación -->
    <header>
        <div style="width: 80px;" class="desktop-only"></div> 
        
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Fotos / Videos</a></li>
                <li><a href="#">La Banda</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>

        <!-- Iconos de Redes del menú superior -->
        <div class="social-header">
            <a href="#" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="#" target="_blank"><i class="fab fa-x-twitter"></i></a>
            <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="#" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="#" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main>
        <h1 class="main-title">ASMUVE</h1>
        
        <div class="logo-container">
            <!-- Si tu imagen termina en .jpg cambia logo.png por logo.jpg abajo -->
            <img src="logo.png" alt="Logotipo ASMUVE Zacatecoluca">
        </div>

        <div class="divider"></div>
    </main>

    <!-- Pie de Página -->
    <footer>
        <div class="social-footer">
            <p>Síguenos en:</p>
            <div class="social-footer-icons">
                <a href="#" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="#" target="_blank"><i class="fab fa-x-twitter"></i></a>
                <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="#" target="_blank"><i class="fab fa-tiktok"></i></a>
                <a href="#" target="_blank"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
        <p class="copyright">&copy; 2026 Creado por ASMUVE</p>
    </footer>

</body>
</html>
