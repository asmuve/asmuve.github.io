<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos y Videos - ASMUVE</title>
    <style>
        /* Estilos Generales Espejo */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .top-bar {
            height: 4px;
            background-color: #7b1fa2; 
            width: 100%;
        }
        header {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1.5rem;
                padding: 1rem;
            }
            nav ul {
                gap: 1rem !important;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 2.5rem;
        }
        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        nav ul li a:hover {
            color: #b388ff;
        }
        .social-icon-svg {
            width: 18px;
            height: 18px;
            fill: #ffffff;
            transition: fill 0.3s ease, transform 0.2s ease;
            vertical-align: middle;
        }
        .social-icon-svg:hover {
            fill: #b388ff;
            transform: scale(1.1);
        }
        .social-header {
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }

        /* Sección Multimedia Principal */
        main {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        .main-title {
            text-align: center;
            font-size: 2.3rem;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #aaaaaa;
            letter-spacing: 1px;
            margin-bottom: 4rem;
        }

        /* Estilos de las 3 Secciones Principales */
        .section-category {
            margin-bottom: 4rem;
        }
        .section-category h2 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            border-left: 3px solid #7b1fa2;
            padding-left: 1rem;
            color: #ffffff;
        }

        /* Rejillas para las fotos directas */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }
        .gallery-photo {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: block;
        }
        .gallery-photo:hover {
            transform: scale(1.02);
            border-color: #7b1fa2;
        }
        
        /* Contenedor adaptado para videos */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .divider {
            width: 60px;
            height: 1px;
            background-color: #333333;
            margin: 3rem auto 1.5rem auto;
        }
        footer {
            padding: 2rem 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: #888888;
        }
        .copyright {
            font-size: 0.7rem;
            margin-top: 1rem;
        }
    </style>
</head>
