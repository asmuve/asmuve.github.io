<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - ASMUVE</title>
    <style>
        /* Estilos Generales Estricto Espejo de Index */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Línea decorativa superior morada */
        .top-bar {
            height: 4px;
            background-color: #7b1fa2; 
            width: 100%;
        }

        /* Navegación Superior */
        header {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1.5rem;
                padding: 1rem;
            }
            nav ul {
                gap: 1rem !important;
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2.5rem;
        }
        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        nav ul li a:hover {
            color: #b388ff;
        }

        .social-icon-svg {
            width: 18px;
            height: 18px;
            fill: #ffffff;
            transition: fill 0.3s ease, transform 0.2s ease;
            vertical-align: middle;
        }
        .social-icon-svg:hover {
            fill: #b388ff;
            transform: scale(1.1);
        }

        .social-header {
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }

        /* Contenido Central Especial de Contacto */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }
        .main-title {
            font-size: 2.3rem;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #aaaaaa;
            letter-spacing: 1px;
            margin-bottom: 3rem;
        }

        /* Contenedor de Botones de Contacto arreglado */
        .contact-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            width: 100%;
            max-width: 350px;
        }
        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1rem 2rem;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
            border: 1px solid #333333;
            border-radius: 4px;
            background-color: transparent;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        /* Efectos Hover personalizados con la paleta de la banda */
        .contact-btn:hover {
            border-color: #b388ff;
            background-color: #120a1c;
            transform: translateY(-2px);
        }
        .contact-btn svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
            transition: fill 0.3s ease;
        }
        .contact-btn:hover svg {
            fill: #b388ff;
        }

        /* Línea separadora antes del footer */
        .divider {
            width: 60px;
            height: 1px;
            background-color: #333333;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
        }

        /* Pie de Página */
        footer {
            padding: 2rem 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: #888888;
        }
        .copyright {
            font-size: 0.7rem;
            margin-top: 1rem;
        }
    </style>
</head>
